  <style>
  body { margin:0; background:#0f172a; font-family:Arial; }
  #map { height:100vh; }

  /* Estilo para o container de pesquisa e autocomplete */
  .search-container {
      position: absolute;
      top: 10px; /* Alinhando com o header, mas ligeiramente abaixo ou ao lado */
      left: 10px;
      background:#111827;
      padding: 12px;
      border-radius: 12px;
      color:#fff;
      z-index: 1050; /* Garantindo que fique sobre o mapa */
  }

  #municipioSearch {
      width: 250px;
      padding: 8px;
      border-radius: 5px;
      border: none;
      background-color: #374151; /* Cor de fundo escura, como o painel */
      color: white;
  }

  /* O container para as sugestões (autocomplete) */
  .suggestions {
      position: absolute;
      top: 100%; /* Posiciona abaixo do campo de busca */
      left: 0;
      right: 0;
      background-color: #2d3748; /* Cor mais escura para o dropdown */
      border-radius: 5px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1050;
  }

  .suggestions div {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #3f4d60;
  }
  .suggestions div:hover {
      background-color: #3e5067; /* Efeito hover */
  }

  /* Ajustando o posicionamento dos filtros para abrir espaço */
  .filtro {
    position:absolute;
    top:90px;
    right:10px;
    background:#111827;
    padding:10px;
    border-radius:10px;
    color:#fff;
    z-index:1000;
  }

  .header {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#111827;
    padding:10px 20px;
    border-radius:12px;
    color:#fff;
    z-index:1000;
    display:flex;
    align-items:center;
    gap:14px;
    white-space:nowrap;
  }
  .header img {
    height:55px;
    width:auto;
  }
  .header-text {
    text-align:center;
    line-height:1.4;
  }

  .painel {
    position:absolute;
    top:225px;
    right:10px;
    background:#111827;
    padding:10px;
    border-radius:10px;
    color:#fff;
    z-index:1000;
  }

  .quadro-efetivo {
    position:absolute;
    top:285px;
    right:10px;
    background:#111827;
    padding:12px 14px;
    border-radius:10px;
    color:#fff;
    z-index:1000;
    min-width:160px;
  }
  .quadro-efetivo b {
    display:block;
    margin-bottom:8px;
    font-size:13px;
    color:#93c5fd;
    border-bottom:1px solid #1e3a5f;
    padding-bottom:5px;
  }
  .efetivo-linha {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:5px 0;
    font-size:13px;
  }
  .efetivo-linha span.label-item {
    color:#cbd5e1;
  }
  .efetivo-valor {
    font-weight:bold;
    font-size:15px;
    color:#fff;
    background:#1e293b;
    border:1px solid #334155;
    border-radius:5px;
    padding:2px 8px;
    min-width:44px;
    text-align:center;
    cursor:pointer;
    outline:none;
    width:55px;
  }
  .efetivo-valor:focus {
    border-color:#3b82f6;
    background:#1e3a5f;
  }
  /* Labels do split Fortaleza */
  .label-split {
    font-size:13px;
    font-weight:bold;
    color:#fff;
    text-shadow:0 0 4px #000, 0 0 8px #000;
    background:rgba(0,0,0,0.45);
    padding:3px 8px;
    border-radius:5px;
    white-space:nowrap;
    pointer-events:none;
  }

  /* Remove setas do input number */
  .efetivo-valor::-webkit-inner-spin-button,
  .efetivo-valor::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
  .efetivo-valor { -moz-appearance:textfield; }

  /* ===== POPUP LEAFLET — TEMA ESCURO ===== */
  .leaflet-popup-content-wrapper {
    background:#1e293b !important;
    border:1px solid #334155 !important;
    border-radius:10px !important;
    box-shadow:0 4px 20px rgba(0,0,0,0.5) !important;
    padding:0 !important;
  }
  .leaflet-popup-content {
    margin:0 !important;
    min-width:0 !important;
  }
  .leaflet-popup-tip {
    background:#1e293b !important;
  }
  .leaflet-popup-close-button {
    color:#94a3b8 !important;
    font-size:16px !important;
    top:6px !important;
    right:8px !important;
  }
  .leaflet-popup-close-button:hover { color:#fff !important; }

  /* ===== MENU POPUP COMPACTO ===== */
  .menu-popup {
    padding:12px 14px 14px;
    min-width:180px;
  }
  .menu-popup .popup-title {
    font-size:13px;
    font-weight:bold;
    color:#93c5fd;
    margin-bottom:10px;
    padding-bottom:7px;
    border-bottom:1px solid #334155;
    white-space:nowrap;
  }
  .menu-popup .popup-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
  }
  .menu-popup .popup-grid button {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    padding:8px 4px;
    border:none;
    border-radius:7px;
    cursor:pointer;
    font-size:10px;
    font-weight:600;
    color:#fff;
    background:#1d4ed8;
    transition:filter .15s;
    line-height:1.2;
  }
  .menu-popup .popup-grid button:hover { filter:brightness(1.2); }
  .menu-popup .popup-grid button .ico { font-size:16px; }
  .menu-popup .popup-grid .btn-futura  { background:#0e7490; }
  .menu-popup .popup-grid .btn-impl    { background:#15803d; }
  .menu-popup .popup-grid .btn-edit    { background:#1d4ed8; }
  .menu-popup .popup-grid .btn-limpar  { background:#991b1b; }

  .btn-cloud {
    position: absolute;
    bottom: 75px;
    left: 10px;
    background: #065f46;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .btn-cloud:hover { background: #047857; }
  .btn-cloud.salvando { background: #92400e; cursor: wait; }

  #saveStatus {
    position: absolute;
    bottom: 120px;
    left: 10px;
    background: #111827;
    color: #94a3b8;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 8px;
    z-index: 1000;
    display: none;
    max-width: 200px;
  }

  .btn-print {
    position: absolute;
    bottom: 30px;
    left: 10px;
    background: #1e40af;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .btn-print:hover { background: #2563eb; }

  /* ===== MODAL DE EDIÇÃO ===== */
  .modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:3000;
    align-items:center;
    justify-content:center;
  }
  .modal-overlay.ativo { display:flex; }
  .modal-box {
    background:#1e293b;
    border:1px solid #334155;
    border-radius:14px;
    padding:24px 28px;
    min-width:320px;
    color:#fff;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .modal-box h3 {
    margin:0 0 16px;
    font-size:16px;
    color:#93c5fd;
    border-bottom:1px solid #334155;
    padding-bottom:10px;
  }
  .modal-campo {
    display:flex;
    flex-direction:column;
    margin-bottom:12px;
  }
  .modal-campo label {
    font-size:11px;
    color:#94a3b8;
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .modal-campo input, .modal-campo select {
    background:#0f172a;
    border:1px solid #334155;
    border-radius:6px;
    color:#fff;
    padding:7px 10px;
    font-size:13px;
    outline:none;
  }
  .modal-campo input:focus, .modal-campo select:focus { border-color:#3b82f6; }
  .modal-campo select option { background:#1e293b; }
  .modal-btns {
    display:flex;
    gap:8px;
    margin-top:18px;
  }
  .modal-btns button {
    flex:1;
    padding:8px;
    border:none;
    border-radius:7px;
    cursor:pointer;
    font-size:13px;
    font-weight:bold;
  }
  .btn-salvar { background:#2563eb; color:#fff; }
  .btn-salvar:hover { background:#1d4ed8; }
  .btn-cancelar { background:#374151; color:#fff; }
  .btn-cancelar:hover { background:#4b5563; }

  @page { margin: 0; }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { margin: 0 !important; padding: 0 !important; width: 100% !important; height: 100% !important; background: #fff !important; }
    .header, .search-container, .filtro, .painel, .btn-print,
    .leaflet-control-container { display: none !important; }
    #map {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      margin: 0 !important; padding: 0 !important;
      z-index: 0 !important;
    }
    .leaflet-container {
      width: 100vw !important;
      height: 100vh !important;
    }
  }

  .label {
    font-size: var(--label-size, 3px);
    font-weight:bold;
    color:#fff;
    text-shadow:1px 1px 3px #000;
    pointer-events:none;
    white-space: nowrap;
    transition: font-size 0.2s ease;
  }
  </style>

  <div class="header">

      Mapa Interativo RAIO

    <input type="checkbox" id="chkSemBase" checked> Sem base<br>
    <input type="checkbox" id="chkLegenda" checked> Legenda
  </div >

  <div class="painel" id="painelInfo"></div>

  <div id="saveStatus"></div>
  <button class="btn-cloud" id="btnCloud" onclick="salvarNuvem()">☁️ Salvar Online</button>
  <button class="btn-print" onclick="imprimirMapa()">🖨️ Imprimir Mapa</button>

  <div class="quadro-efetivo">

    <div class="efetivo-linha">

    </div>
    <div class="efetivo-linha">

    </div>
    <div class="efetivo-linha">
      <span class="label-item">🚔 Viaturas</span>
      <input class="efetivo-valor" id="qtdViaturas" type="number" min="0" value="0">
    </div>
  </div>

  <!-- Modal de Edição -->

      <div class="modal-campo">
        <label>Batalhão</label>
        <select id="editBat">
          <option>1ºBPRaio</option><option>2ºBPRaio</option>
          <option>3ºBPRaio</option><option>4ºBPRaio</option>
          <option>5ºBPRaio</option>
        </select>
      </div>
      <div class="modal-campo">
        <label>Companhia</label>
        <select id="editCia">
          <option>1ªCia</option><option>2ªCia</option><option>3ªCia</option>
          <option>4ªCia</option><option>5ªCia</option>
        </select>
      </div>
      <div class="modal-campo">
        <label>Pelotão (deixe em branco se for sede de Cia)</label>
        <select id="editPel">
          <option value="">— Sede de Cia —</option>
          <option>1ºPel</option><option>2ºPel</option><option>3ºPel</option>
          <option>4ºPel</option><option>5ºPel</option><option>6ºPel</option>
          <option>7ºPel</option>
        </select>
      </div>
      <div class="modal-campo">
        <label>Ordem de implantação</label>
        <input type="number" id="editOrdem" min="1">
      </div>
      <div class="modal-campo">
        <label>Data de inauguração (dd/mm/aaaa)</label>
        <input type="text" id="editData" placeholder="Ex: 23/07/2016">
      </div>
      <div class="modal-btns">
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        <button class="btn-salvar" onclick="salvarEdicao()">💾 Salvar</button>
      </div>
    </div>
  </div>

  // ===== CENTROIDE REAL DO POLÍGONO =====
  function getCentroid(feature) {
    var coords;
    var geom = feature.geometry;
    if (geom.type === "MultiPolygon") {
      // Usa o maior polígono
      var maxArea = 0, best = null;
      geom.coordinates.forEach(function(poly) {
        var ring = poly[0], area = 0;
        for (var i = 0; i < ring.length - 1; i++) {
          area += ring[i][0] * ring[i+1][1] - ring[i+1][0] * ring[i][1];
        }
        area = Math.abs(area);
        if (area > maxArea) { maxArea = area; best = ring; }
      });
      coords = best;
    } else {
      coords = geom.coordinates[0];
    }
    var cx = 0, cy = 0, a = 0;
    for (var i = 0; i < coords.length - 1; i++) {
      var x0 = coords[i][0], y0 = coords[i][1];
      var x1 = coords[i+1][0], y1 = coords[i+1][1];
      var cross = x0 * y1 - x1 * y0;
      cx += (x0 + x1) * cross;
      cy += (y0 + y1) * cross;
      a += cross;
    }
    a *= 0.5;
    cx /= (6 * a);
    cy /= (6 * a);
    return L.latLng(cy, cx);
  }

  // ===== COR =====
  function getCor(nome){
    if(raio[nome]) return "#005eff";

  // Divide o polígono de Fortaleza em norte (Sede) e sul (Messejana)
  function computeFortalezaHalves(feature) {
    var geom = feature.geometry;
    var ring = (geom.type === 'MultiPolygon') ? geom.coordinates[0][0] : geom.coordinates[0];

    // Latitude média como linha de corte
    var sumLat = 0;
    ring.forEach(function(p){ sumLat += p[1]; });
    var splitLat = sumLat / ring.length;

    var north = [], south = [];
    for (var i = 0; i < ring.length - 1; i++) {
      var lng0=ring[i][0], lat0=ring[i][1];
      var lng1=ring[i+1][0], lat1=ring[i+1][1];
      if (lat0 >= splitLat) north.push([lat0, lng0]);
      else                  south.push([lat0, lng0]);
      // Ponto de interseção com a linha de corte
      if ((lat0 >= splitLat) !== (lat1 >= splitLat)) {
        var t = (splitLat - lat0) / (lat1 - lat0);
        var lngI = lng0 + t * (lng1 - lng0);
        north.push([splitLat, lngI]);
        south.push([splitLat, lngI]);
      }
    }
    return { north: north, south: south };
  }

  // Centroide simples (média) de um array [[lat,lng],...]
  function halfCentroid(pts) {
    var lat=0, lng=0;
    pts.forEach(function(p){ lat+=p[0]; lng+=p[1]; });
    return [lat/pts.length, lng/pts.length];
  }

  /**
   * Filtra e exibe as sugestões de nomes na caixa de autocomplete.
   * @param {Event} e - O evento de digitação.
   */
  function handleAutocomplete(e) {
      const query = e.target.value.toLowerCase().trim();
      const suggestionsContainer = document.getElementById('autocompleteSuggestions');
      suggestionsContainer.innerHTML = '';

      if (query.length === 0) {
          suggestionsContainer.style.display = 'none';
          return;
      }

      // Prioriza nomes que COMEÇAM com a query, depois os que apenas CONTÊM
      let startsWith = [], contains = [];
      for (const name in allMunicipalities) {
          const lower = name.toLowerCase();
          if (lower.startsWith(query)) startsWith.push(name);
          else if (lower.includes(query)) contains.push(name);
      }
      startsWith.sort();
      contains.sort();
      const matches = [...startsWith, ...contains];

      if (matches.length > 0) {
          suggestionsContainer.style.display = 'block';
          matches.forEach(match => {
              const div = document.createElement('div');
              div.textContent = match;
              div.addEventListener('click', () => selectMunicipality(match));
              suggestionsContainer.appendChild(div);
          });
      } else {
          suggestionsContainer.style.display = 'none';
      }
  }

  /**
   * Seleciona um município da lista de sugestões, preenchendo o campo e chamando a lógica principal.      
   * @param {string} name - Nome do município selecionado.
   */
  function selectMunicipality(name) {
      document.getElementById('municipioSearch').value = name;
      document.getElementById('autocompleteSuggestions').style.display = 'none';

      const layer = layerMap[name];
      if (!layer) return;

      // Remove destaque anterior
      if (highlightedLayer) {
          geojsonLayer.resetStyle(highlightedLayer);
          highlightedLayer = null;
      }

      // Zoom no município
      map.fitBounds(layer.getBounds(), { padding: [40, 40] });

      // Destaque visual (borda laranja)
      layer.setStyle({ weight: 4, color: '#ff6600', fillOpacity: 0.95 });
      highlightedLayer = layer;

      // Mostra tooltip fixo
      layer.openTooltip(layer.getBounds().getCenter());
  }

    layerMap = {};

    geojsonLayer = L.geoJSON(geoData,{

      style:f=>{

        let mostrar =
          (raio[nome] && chkImplantadas.checked) ||

          (!raio[nome] && !futuras.includes(nome) && chkSemBase.checked);

        if(!mostrar) return {opacity:0,fillOpacity:0};

        return {
          color:"#111",
          weight:1, // Default weight for boundaries (normal view)
          fillColor:getCor(nome),
          fillOpacity:0.9
        };
      },

      onEachFeature:(f,layer)=>{
        let nome = f.properties.name;
        layerMap[nome] = layer; // registra para busca

        // TOOLTIP
        let info;
        if (nome === 'Fortaleza') {

            🟣 <b>Messejana</b> · ${mOrg.pel}/${mOrg.cia}/${mOrg.bat} · Ord. ${mRaio ? mRaio.ord : '—'} · ${mRaio ? mRaio.data : '—'}`;

        } else {
          info = `<b>${nome}</b><br>Sem base`;
        }
        layer.bindTooltip(info, {sticky:true});

        // --- HOVER EFFECT ---
        if (nome === 'Fortaleza') {
          // Hover especial: divide Fortaleza em Sede (norte) e Messejana (sul)
          layer.on("mouseover", function(e) {
            if (!fortalezaHalves || splitOverlay) return;
            e.target.setStyle({opacity:0, fillOpacity:0}); // esconde original

            var sedeP = L.polygon(fortalezaHalves.north, {
              interactive:false, color:'#FFD700', weight:2.5,
              fillColor:'#005eff', fillOpacity:0.92
            });
            var messP = L.polygon(fortalezaHalves.south, {
              interactive:false, color:'#FFD700', weight:2.5,
              fillColor:'#7c3aed', fillOpacity:0.92
            });
            var sedeLabel = L.marker(halfCentroid(fortalezaHalves.north), {
              interactive:false,
              icon:L.divIcon({className:'label-split', html:'🔵 Sede'})
            });
            var messLabel = L.marker(halfCentroid(fortalezaHalves.south), {
              interactive:false,
              icon:L.divIcon({className:'label-split', html:'🟣 Messejana'})
            });
            splitOverlay = L.layerGroup([sedeP, messP, sedeLabel, messLabel]).addTo(map);
          });
          layer.on("mouseout", function(e) {
            geojsonLayer.resetStyle(e.target);
            if (splitOverlay) { map.removeLayer(splitOverlay); splitOverlay = null; }
          });
        } else {
          layer.on("mouseover", function(e) {
            e.target.setStyle({weight:3, color:'#FFD700', fillOpacity:0.95});
          });
          layer.on("mouseout", function(e) {
            geojsonLayer.resetStyle(e.target);

        // ---------------------------------------------------

        // MENU
        layer.on("click",(e)=>{
          let html = `

        });

        if(mostrarLabels){

            interactive:false,

  // ===== INTEGRAÇÃO GOOGLE APPS SCRIPT =====

  function _estaNoAppsScript() {

  function setSaveStatus(msg, cor) {
    var el = document.getElementById('saveStatus');
    el.textContent = msg;
    el.style.color = cor || '#94a3b8';
    el.style.display = 'block';
  }

  function _carregarDadosNuvem(callback) {
    if (!_estaNoAppsScript()) { callback(); return; }
    setSaveStatus('⏳ Carregando dados...', '#fbbf24');
    google.script.run
      .withSuccessHandler(function(json) {
        if (json) {
          try {
            var saved = JSON.parse(json);
            if (saved.raio)    raio    = saved.raio;
            if (saved.futuras) futuras = saved.futuras;
            if (saved.orgInfo) for (var k in saved.orgInfo) orgInfo[k] = saved.orgInfo[k];
            if (saved.efetivo) {
              document.getElementById('qtdPoliciais').value = saved.efetivo.policiais || 0;
              document.getElementById('qtdMotos').value     = saved.efetivo.motos     || 0;
              document.getElementById('qtdViaturas').value  = saved.efetivo.viaturas  || 0;
            }
            setSaveStatus('✅ Salvo em: ' + (saved.ultimoSalvo || '—'), '#34d399');
          } catch(e) {}
        } else {
          setSaveStatus('☁️ Sem dados salvos — usando padrão', '#64748b');
        }
        callback();
      })
      .withFailureHandler(function() { callback(); })
      .getData();
  }

  var _saveTimer = null;
  window.salvarNuvem = function(silencioso) {
    if (!_estaNoAppsScript()) {
      if (!silencioso) alert('Funcionalidade disponível apenas quando hospedado no Google Apps Script.');
      return;
    }
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(function() {
      var btn = document.getElementById('btnCloud');
      btn.classList.add('salvando');
      btn.textContent = '⏳ Salvando...';
      setSaveStatus('⏳ Salvando...', '#fbbf24');

      var payload = JSON.stringify({
        raio: raio,
        futuras: futuras,
        orgInfo: orgInfo,
        efetivo: {
          policiais: parseInt(document.getElementById('qtdPoliciais').value) || 0,
          motos:     parseInt(document.getElementById('qtdMotos').value)     || 0,
          viaturas:  parseInt(document.getElementById('qtdViaturas').value)  || 0
        }
      });

      google.script.run
        .withSuccessHandler(function(timestamp) {
          btn.classList.remove('salvando');
          btn.textContent = '☁️ Salvar Online';
          setSaveStatus('✅ Salvo em: ' + (timestamp || '—'), '#34d399');
        })
        .withFailureHandler(function() {
          btn.classList.remove('salvando');
          btn.textContent = '☁️ Salvar Online';
          setSaveStatus('❌ Erro ao salvar', '#f87171');
        })
        .saveData(payload);
    }, 300);
  };

  // ===== IMPRIMIR =====
  window.imprimirMapa = function() {
    var prevCenter = map.getCenter();
    var prevZoom = map.getZoom();

    // 1. Esconde toda a UI via JS (não depende de CSS print)
    var uiEls = document.querySelectorAll('.header, .search-container, .filtro, .painel, .btn-print');
    uiEls.forEach(function(el) { el.style.display = 'none'; });
    var ctrl = document.querySelector('.leaflet-control-container');
    if (ctrl) ctrl.style.display = 'none';

    // 2. Mapa ocupa a tela inteira (Leaflet recalcula imediatamente)
    var mapEl = document.getElementById('map');
    var origStyle = mapEl.style.cssText;
    mapEl.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;';

    map.invalidateSize({ animate: false });
    map.fitBounds(geojsonLayer.getBounds(), { padding: [30, 30], animate: false });

    function restaurar() {
      mapEl.style.cssText = origStyle;
      uiEls.forEach(function(el) { el.style.display = ''; });
      if (ctrl) ctrl.style.display = '';
      map.setView(prevCenter, prevZoom, { animate: false });
      map.invalidateSize();
    }

    // 3. Espera tiles renderizarem, imprime, e restaura
    setTimeout(function() {
      window.print();
      restaurar();
    }, 600);
  };

    var r = raio[nome] || {ord:'', data:''};
    document.getElementById('editOrdem').value = r.ord || '';
    document.getElementById('editData').value  = r.data || '';

    document.getElementById('modalEdicao').classList.add('ativo');
  };

  window.fecharModal = function() {
    document.getElementById('modalEdicao').classList.remove('ativo');
    _nomeEditando = null;
  };

  window.salvarEdicao = function() {
    if (!_nomeEditando) return;
    var nome = _nomeEditando;

    var bat  = document.getElementById('editBat').value;
    var cia  = document.getElementById('editCia').value;
    var pel  = document.getElementById('editPel').value || null;
    var ord  = document.getElementById('editOrdem').value;
    var data = document.getElementById('editData').value.trim();

    // Atualiza organograma
    orgInfo[nome] = {bat, cia, pel};

    // Atualiza dados da base (só se tiver ordem e data)
    if (ord && data) {
      raio[nome] = {ord, data};
      futuras = futuras.filter(c => c !== nome);
    }

    fecharModal();
    atualizarMapa();
    salvarNuvem(true);
  };

  // Fecha modal ao clicar fora da caixa
  document.getElementById('modalEdicao').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  // ===== FILTROS =====
  document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("change",()=>atualizarMapa());
  });

  // Auto-save do efetivo ao digitar (debounce 1,5s)
  ['qtdPoliciais','qtdMotos','qtdViaturas'].forEach(function(id){
    document.getElementById(id).addEventListener('input', function(){
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(function(){ salvarNuvem(true); }, 1500);
    });
  });

  </script>

  </body>
  </html>
